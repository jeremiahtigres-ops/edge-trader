[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."bot-cycle-background"]
  timeout = 900

[[redirects]]
  from = "/api/bot/status"
  to = "/.netlify/functions/bot-status"
  status = 200
  force = true

[[redirects]]
  from = "/api/bot/cycle"
  to = "/.netlify/functions/bot-cycle"
  status = 200
  force = true

[[redirects]]
  from = "/api/bot/sell"
  to = "/.netlify/functions/bot-sell"
  status = 200
  force = true